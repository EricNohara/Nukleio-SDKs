name: Release Go module

on:
  push:
    tags:
      - "sdks/go/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: go
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: sdks/go/go.mod
      - name: Verify tag
        working-directory: .
        run: python scripts/verify_release_versions.py go "$GITHUB_REF_NAME"
      - run: go test ./...
      - name: Create GitHub release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME"; then
            echo "$GITHUB_REF_NAME already has a GitHub release"
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Go ${GITHUB_REF_NAME#sdks/go/}"
          fi
